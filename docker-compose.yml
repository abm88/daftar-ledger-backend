services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: daftar
      POSTGRES_USER: daftar
      POSTGRES_PASSWORD: daftar
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U daftar -d daftar"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    build: .
    command: sh -c "node scripts/migrate.js && node scripts/seed.js"
    environment: &app_env
      NODE_ENV: development
      PORT: "3000"
      PGHOST: db
      PGPORT: "5432"
      PGDATABASE: daftar
      PGUSER: daftar
      PGPASSWORD: daftar
      JWT_SECRET: local-dev-secret-change-in-production
    depends_on:
      db:
        condition: service_healthy

  api:
    build: .
    ports:
      - "3000:3000"
    environment: *app_env
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  pgdata:
